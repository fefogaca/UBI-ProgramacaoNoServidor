openapi: 3.0.3
info:
  title: GREENHERB API
  version: 1.0.0-sprint1
  description: |
    Especificacao OpenAPI da Sprint 1 do projeto GREENHERB.
    Esta sprint cobre os endpoints principais do dominio e exclui a implementacao
    do processo de autenticacao.
  license:
    name: MIT
servers:
  - url: http://localhost:3000/api/v1
    description: Servidor local de desenvolvimento
tags:
  - name: Users
    description: Gestao de utilizadores
  - name: Herbs
    description: Catalogo e importacao de ervas aromaticas
  - name: CultivationPlans
    description: Definicao e manutencao de planos de cultivo
  - name: Batches
    description: Ciclo de vida e produtividade dos lotes
  - name: Tasks
    description: Planeamento e execucao de tarefas operacionais
  - name: Measurements
    description: Registo e consulta de medicoes ambientais
  - name: Alerts
    description: Gestao de alertas de monitorizacao
  - name: Automation
    description: Controlo do modo manual e automatico
  - name: Reports
    description: Exportacao de relatorios
  - name: AuditLogs
    description: Consulta de eventos de auditoria
security:
  - BearerAuth: []
paths:
  /users:
    get:
      tags: [Users]
      summary: Listar utilizadores
      responses:
        '200':
          description: Lista de utilizadores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Users]
      summary: Criar utilizador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Utilizador criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    get:
      tags: [Users]
      summary: Obter utilizador por ID
      responses:
        '200':
          description: Utilizador encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Users]
      summary: Atualizar utilizador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Utilizador atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Users]
      summary: Desativar utilizador
      responses:
        '204':
          description: Utilizador desativado
        '404':
          $ref: '#/components/responses/NotFoundError'

  /herbs:
    get:
      tags: [Herbs]
      summary: Listar ervas aromaticas
      responses:
        '200':
          description: Lista de ervas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Herb'
    post:
      tags: [Herbs]
      summary: Criar erva aromatica
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHerbRequest'
      responses:
        '201':
          description: Erva criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Herb'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /herbs/{herbId}:
    parameters:
      - $ref: '#/components/parameters/HerbIdParam'
    get:
      tags: [Herbs]
      summary: Obter erva por ID
      responses:
        '200':
          description: Erva encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Herb'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Herbs]
      summary: Atualizar erva
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHerbRequest'
      responses:
        '200':
          description: Erva atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Herb'
    delete:
      tags: [Herbs]
      summary: Remover erva
      responses:
        '204':
          description: Erva removida

  /herbs/import:
    post:
      tags: [Herbs]
      summary: Importar ervas via CSV ou XLSX
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: Importacao aceite para processamento
          content:
            application/json:
              schema:
                type: object
                required: [importId, status]
                properties:
                  importId:
                    type: string
                  status:
                    type: string
                    enum: [queued, processing, completed, failed]
        '400':
          $ref: '#/components/responses/BadRequestError'

  /cultivation-plans:
    get:
      tags: [CultivationPlans]
      summary: Listar planos de cultivo
      parameters:
        - in: query
          name: type
          schema:
            $ref: '#/components/schemas/CultivationPlanType'
      responses:
        '200':
          description: Lista de planos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CultivationPlan'
    post:
      tags: [CultivationPlans]
      summary: Criar plano de cultivo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCultivationPlanRequest'
            examples:
              regularPlan:
                summary: Plano regular para manjericao
                value:
                  herbId: herb_001
                  name: Plano Regular Primavera
                  type: regular
                  regularConfig:
                    temperature: { min: 18, max: 26 }
                    humidity: { min: 45, max: 70 }
                    luminosity: { min: 5000, max: 12000 }
                    irrigation:
                      frequencyHours: 12
                      amountMl: 300
                    fertilization:
                      frequencyDays: 7
                      dosage: NPK-10-10 5g/L
                    expectedDurationDays: 40
      responses:
        '201':
          description: Plano criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CultivationPlan'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /cultivation-plans/{planId}:
    parameters:
      - $ref: '#/components/parameters/PlanIdParam'
    get:
      tags: [CultivationPlans]
      summary: Obter plano por ID
      responses:
        '200':
          description: Plano encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CultivationPlan'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [CultivationPlans]
      summary: Atualizar plano
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCultivationPlanRequest'
      responses:
        '200':
          description: Plano atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CultivationPlan'
    delete:
      tags: [CultivationPlans]
      summary: Remover plano
      responses:
        '204':
          description: Plano removido

  /batches:
    get:
      tags: [Batches]
      summary: Listar lotes
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/BatchStatus'
      responses:
        '200':
          description: Lista de lotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Batch'
    post:
      tags: [Batches]
      summary: Criar lote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBatchRequest'
      responses:
        '201':
          description: Lote criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Batch'

  /batches/{batchId}:
    parameters:
      - $ref: '#/components/parameters/BatchIdParam'
    get:
      tags: [Batches]
      summary: Obter lote por ID
      responses:
        '200':
          description: Lote encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Batch'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Batches]
      summary: Atualizar lote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBatchRequest'
      responses:
        '200':
          description: Lote atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Batch'
    delete:
      tags: [Batches]
      summary: Remover lote
      responses:
        '204':
          description: Lote removido

  /batches/{batchId}/plans:
    parameters:
      - $ref: '#/components/parameters/BatchIdParam'
    post:
      tags: [Batches]
      summary: Associar plano ao lote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planId]
              properties:
                planId:
                  type: string
      responses:
        '200':
          description: Plano associado ao lote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Batch'

  /batches/{batchId}/split:
    parameters:
      - $ref: '#/components/parameters/BatchIdParam'
    post:
      tags: [Batches]
      summary: Dividir lote parcialmente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [childBatches]
              properties:
                childBatches:
                  type: array
                  items:
                    type: object
                    required: [code, quantity]
                    properties:
                      code:
                        type: string
                      quantity:
                        type: number
                        minimum: 0
      responses:
        '201':
          description: Lote dividido com sucesso
          content:
            application/json:
              schema:
                type: object
                required: [parentBatch, children]
                properties:
                  parentBatch:
                    $ref: '#/components/schemas/Batch'
                  children:
                    type: array
                    items:
                      $ref: '#/components/schemas/Batch'

  /batches/{batchId}/losses:
    parameters:
      - $ref: '#/components/parameters/BatchIdParam'
    post:
      tags: [Batches]
      summary: Registar perdas no lote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity, reason]
              properties:
                quantity:
                  type: number
                  minimum: 0
                reason:
                  type: string
                  minLength: 3
      responses:
        '201':
          description: Perda registada

  /batches/{batchId}/productivity:
    parameters:
      - $ref: '#/components/parameters/BatchIdParam'
    get:
      tags: [Batches]
      summary: Obter produtividade do lote
      responses:
        '200':
          description: Indicadores de produtividade
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductivitySummary'

  /batches/{batchId}/plan-vs-actual:
    parameters:
      - $ref: '#/components/parameters/BatchIdParam'
    get:
      tags: [Batches]
      summary: Comparar plano com valores reais do lote
      responses:
        '200':
          description: Comparacao entre plano e execucao real
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanVsActualSummary'

  /tasks:
    get:
      tags: [Tasks]
      summary: Listar tarefas
      parameters:
        - in: query
          name: batchId
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskStatus'
      responses:
        '200':
          description: Lista de tarefas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      tags: [Tasks]
      summary: Criar tarefa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
            examples:
              irrigacao:
                summary: Criar tarefa de rega
                value:
                  batchId: batch_001
                  type: rega
                  scheduledAt: '2026-05-06T08:00:00Z'
      responses:
        '201':
          description: Tarefa criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /tasks/{taskId}:
    parameters:
      - $ref: '#/components/parameters/TaskIdParam'
    get:
      tags: [Tasks]
      summary: Obter tarefa por ID
      responses:
        '200':
          description: Tarefa encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Tasks]
      summary: Atualizar tarefa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Tarefa atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /tasks/{taskId}/complete:
    parameters:
      - $ref: '#/components/parameters/TaskIdParam'
    post:
      tags: [Tasks]
      summary: Marcar tarefa como executada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                executedAt:
                  type: string
                  format: date-time
              required: [executedAt]
      responses:
        '200':
          description: Tarefa marcada como concluida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /measurements:
    get:
      tags: [Measurements]
      summary: Obter historico de medicoes
      parameters:
        - in: query
          name: batchId
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Historico de medicoes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Measurement'
    post:
      tags: [Measurements]
      summary: Registar medicao ambiental
      description: Pode gerar alertas automaticamente quando os limites do plano sao violados.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMeasurementRequest'
            examples:
              medicaoComAlerta:
                summary: Medicao fora do intervalo de temperatura
                value:
                  batchId: batch_001
                  temperature: 33.5
                  humidity: 62
                  luminosity: 11500
                  measuredAt: '2026-05-06T10:30:00Z'
                  source: sensor
      responses:
        '201':
          description: Medicao registada
          content:
            application/json:
              schema:
                type: object
                required: [measurement, generatedAlerts]
                properties:
                  measurement:
                    $ref: '#/components/schemas/Measurement'
                  generatedAlerts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Alert'
              examples:
                created:
                  summary: Medicao registada com alerta critico
                  value:
                    measurement:
                      id: meas_901
                      batchId: batch_001
                      temperature: 33.5
                      humidity: 62
                      luminosity: 11500
                      sensorId: sensor_t1
                      measuredAt: '2026-05-06T10:30:00Z'
                      source: sensor
                    generatedAlerts:
                      - id: alert_400
                        batchId: batch_001
                        measurementId: meas_901
                        severity: critico
                        status: ativo
                        message: Temperatura acima do limite superior do plano
                        createdAt: '2026-05-06T10:30:01Z'

  /alerts:
    get:
      tags: [Alerts]
      summary: Listar alertas
      parameters:
        - in: query
          name: batchId
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/AlertStatus'
        - in: query
          name: severity
          schema:
            $ref: '#/components/schemas/AlertSeverity'
      responses:
        '200':
          description: Lista de alertas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alert'

  /alerts/{alertId}:
    parameters:
      - $ref: '#/components/parameters/AlertIdParam'
    get:
      tags: [Alerts]
      summary: Obter alerta por ID
      responses:
        '200':
          description: Alerta encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /alerts/{alertId}/resolve:
    parameters:
      - $ref: '#/components/parameters/AlertIdParam'
    post:
      tags: [Alerts]
      summary: Resolver alerta
      responses:
        '200':
          description: Alerta resolvido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /alerts/{alertId}/ignore:
    parameters:
      - $ref: '#/components/parameters/AlertIdParam'
    post:
      tags: [Alerts]
      summary: Ignorar alerta (justificacao obrigatoria)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 3
            examples:
              ignoreWithReason:
                summary: Ignorar com justificacao operacional
                value:
                  reason: Sensor em manutencao programada, sem impacto no lote.
      responses:
        '200':
          description: Alerta ignorado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /automation/mode:
    get:
      tags: [Automation]
      summary: Obter modo de operacao
      responses:
        '200':
          description: Modo atual
          content:
            application/json:
              schema:
                type: object
                required: [mode]
                properties:
                  mode:
                    $ref: '#/components/schemas/AutomationMode'
    put:
      tags: [Automation]
      summary: Atualizar modo de operacao
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  $ref: '#/components/schemas/AutomationMode'
      responses:
        '200':
          description: Modo atualizado
          content:
            application/json:
              schema:
                type: object
                required: [mode]
                properties:
                  mode:
                    $ref: '#/components/schemas/AutomationMode'

  /reports/export:
    get:
      tags: [Reports]
      summary: Exportar relatorio
      parameters:
        - in: query
          name: format
          required: true
          schema:
            type: string
            enum: [csv, xlsx]
          example: csv
      responses:
        '200':
          description: Ficheiro de exportacao gerado
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequestError'

  /audit-logs:
    get:
      tags: [AuditLogs]
      summary: Listar logs de auditoria
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: actorId
          schema:
            type: string
      responses:
        '200':
          description: Lista de eventos de auditoria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserIdParam:
      in: path
      name: userId
      required: true
      schema:
        type: string
    HerbIdParam:
      in: path
      name: herbId
      required: true
      schema:
        type: string
    PlanIdParam:
      in: path
      name: planId
      required: true
      schema:
        type: string
    BatchIdParam:
      in: path
      name: batchId
      required: true
      schema:
        type: string
    TaskIdParam:
      in: path
      name: taskId
      required: true
      schema:
        type: string
    AlertIdParam:
      in: path
      name: alertId
      required: true
      schema:
        type: string

  responses:
    BadRequestError:
      description: Pedido invalido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Nao autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Sem permissao
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Recurso nao encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Conflito de dados
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Erro interno
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Role:
      type: string
      enum: [tecnico, responsavel, administrador]
    CultivationPlanType:
      type: string
      enum: [regular, emergencia, pontual]
    AlertSeverity:
      type: string
      enum: [informativo, aviso, critico]
    AlertStatus:
      type: string
      enum: [ativo, resolvido, ignorado]
    BatchStatus:
      type: string
      enum: [ativo, concluido, comprometido]
    TaskStatus:
      type: string
      enum: [pendente, concluida]
    AutomationMode:
      type: string
      enum: [manual, automatico]

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    User:
      type: object
      required: [id, name, email, role, active, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        role:
